# JVM reduzido ao mínimo para máquina com 3 GB de RAM
org.gradle.jvmargs=-Xmx768m -XX:MaxMetaspaceSize=384m -Dfile.encoding=UTF-8 -XX:+TieredCompilation -XX:TieredStopAtLevel=1
android.useAndroidX=true
# This newDsl flag was added by the Flutter template
android.newDsl=false
# This builtInKotlin flag was added by the Flutter template
android.builtInKotlin=false
# Desabilita daemon e paralelismo para economizar memória
org.gradle.daemon=false
org.gradle.parallel=false
org.gradle.configureondemand=false
